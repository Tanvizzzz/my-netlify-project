<!DOCTYPE html>
<html>
<head>
  <title>Netlify CI/CD</title>
  <style>
    body {
      background-color: #ff2e00; /* The bright red background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    .card {
      background-color: #ff9900; /* The orange box */
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    button {
      background-color: red;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 CI/CD Deployment Successful!</h1>
    <p>This website is automatically deployed using GitHub and Netlify.</p>
    <button>Click Me</button>
    <p>Your Netlify CI/CD pipeline is working!</p>
  </div>
</body>
</html>
